<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <radialGradient id="drop-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="body-grad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ff5c5c" />
      <stop offset="70%" stop-color="#dd1a1a" />
      <stop offset="100%" stop-color="#990000" />
    </radialGradient>
    <radialGradient id="tentacle-grad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ff4d4d" />
      <stop offset="100%" stop-color="#aa0808" />
    </radialGradient>
    <!-- Blanket pattern -->
    <pattern id="polka-dots" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="2.5" fill="#ffffff" opacity="0.8" />
    </pattern>
  </defs>

  <!-- Ground Shadow -->
  <ellipse cx="100" cy="175" rx="65" ry="12" fill="url(#drop-shadow)" />

  <!-- Floating Zzz -->
  <g id="zzz" fill="#3b82f6" font-family="sans-serif" font-weight="bold">
    <text x="50" y="55" font-size="12" opacity="0.6">z</text>
    <text x="40" y="42" font-size="16" opacity="0.8">Z</text>
    <text x="26" y="26" font-size="22" opacity="0.95">Z</text>
  </g>

  <!-- Tentacles (Partially visible under body and blanket) -->
  <g id="tentacles">
    <circle cx="50" cy="155" r="15" fill="url(#tentacle-grad)" />
    <circle cx="68" cy="162" r="16" fill="url(#tentacle-grad)" />
    <circle cx="88" cy="165" r="16" fill="url(#tentacle-grad)" />
  </g>

  <!-- Main Round Plush Body (Rotated slightly to look like it is resting/sleeping) -->
  <g transform="translate(100, 115) rotate(15) translate(-100, -115)">
    <circle cx="100" cy="115" r="58" fill="url(#body-grad)" />
    
    <!-- Sleep eyes (drooping curves) -->
    <path d="M 72 112 Q 80 120 88 112" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round" fill="none" />
    <path d="M 112 112 Q 120 120 128 112" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round" fill="none" />
    
    <!-- Mouth (little cute dot/line) -->
    <path d="M 98 123 Q 100 125 102 123" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" fill="none" />
  </g>

  <!-- Pillow (Cozy cream colored) -->
  <path d="M 130 135 C 130 115, 175 115, 175 135 C 175 155, 130 155, 130 135 Z" fill="#fef08a" stroke="#fef08a" stroke-width="2" />

  <!-- Cozy Blue Polka-Dotted Blanket -->
  <g id="blanket">
    <!-- Base blue shape -->
    <path d="M 60 142 C 90 138, 120 142, 148 135 C 160 145, 160 172, 142 172 C 110 172, 70 172, 52 172 C 48 162, 48 148, 60 142 Z" fill="#2563eb" filter="drop-shadow(0px -3px 6px rgba(0,0,0,0.15))" />
    <!-- Polka dot overlay -->
    <path d="M 60 142 C 90 138, 120 142, 148 135 C 160 145, 160 172, 142 172 C 110 172, 70 172, 52 172 C 48 162, 48 148, 60 142 Z" fill="url(#polka-dots)" />
  </g>
</svg>
